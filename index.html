<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ellie - AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="nav-icons">
                <div class="icon">🏠</div>
                <div class="icon active">🎙️</div>
                <div class="icon">⚙️</div>
            </div>
        </aside>
        <main class="main-content">
            <h1>Ellie - AI Assistant</h1>
            <div class="voice-section">
                <div class="mic-circle">🎙️</div>
                <div class="status-bar"><span>Click mic to speak</span></div>
            </div>
            <section class="recent-interactions">
                <h3>RECENT INTERACTIONS</h3>
                <div class="chat-box"></div>
            </section>
            <section class="input-section">
                <input type="text" id="textInput" placeholder="এখানে টাইপ করুন...">
                <button onclick="handleText()">Send</button>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
